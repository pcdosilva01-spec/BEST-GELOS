version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bestgelo-postgres
    environment:
      POSTGRES_DB: bestgelo
      POSTGRES_USER: bestgelo
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bestgelo123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bestgelo -d bestgelo"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bestgelo-network

  redis:
    image: redis:7-alpine
    container_name: bestgelo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bestgelo-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bestgelo-backend
    environment:
      - DATABASE_URL=postgresql://bestgelo:${DB_PASSWORD:-bestgelo123}@postgres:5432/bestgelo?schema=public
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=7d
      - FRONTEND_URL=http://localhost:3000
      - WHATSAPP_BUSINESS_NUMBER=${WHATSAPP_BUSINESS_NUMBER}
      - WHATSAPP_TOKEN=${WHATSAPP_TOKEN}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - bestgelo-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bestgelo-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NODE_ENV=development
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - bestgelo-network

volumes:
  postgres_data:
  redis_data:

networks:
  bestgelo-network:
    driver: bridge