<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="crushedIceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2fe;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#bae6fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7dd3fc;stop-opacity:1" />
    </linearGradient>
    <filter id="crushedGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="#f0f9ff"/>
  <!-- Crushed ice pile -->
  <g filter="url(#crushedGlow)">
    <!-- Layer 1 - bottom -->
    <ellipse cx="200" cy="320" rx="130" ry="40" fill="url(#crushedIceGradient)" stroke="#7dd3fc" stroke-width="1"/>
    <ellipse cx="200" cy="320" rx="130" ry="40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
    <!-- Layer 2 -->
    <ellipse cx="200" cy="270" rx="110" ry="35" fill="url(#crushedIceGradient)" stroke="#7dd3fc" stroke-width="1"/>
    <ellipse cx="200" cy="270" rx="110" ry="35" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
    <!-- Layer 3 -->
    <ellipse cx="200" cy="225" rx="90" ry="30" fill="url(#crushedIceGradient)" stroke="#7dd3fc" stroke-width="1"/>
    <ellipse cx="200" cy="225" rx="90" ry="30" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
    <!-- Layer 4 - top -->
    <ellipse cx="200" cy="185" rx="70" ry="25" fill="url(#crushedIceGradient)" stroke="#7dd3fc" stroke-width="1"/>
    <ellipse cx="200" cy="185" rx="70" ry="25" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
    <!-- Individual shards on top -->
    <polygon points="200,165 210,190 190,190" fill="url(#crushedIceGradient)" stroke="#7dd3fc" stroke-width="1" filter="url(#crushedGlow)"/>
    <polygon points="180,175 195,195 165,195" fill="url(#crushedIceGradient)" stroke="#7dd3fc" stroke-width="1" filter="url(#crushedGlow)"/>
    <polygon points="220,175 235,195 205,195" fill="url(#crushedIceGradient)" stroke="#7dd3fc" stroke-width="1" filter="url(#crushedGlow)"/>
    <polygon points="150,210 165,230 135,230" fill="url(#crushedIceGradient)" stroke="#7dd3fc" stroke-width="1" filter="url(#crushedGlow)"/>
    <polygon points="250,210 265,230 235,230" fill="url(#crushedIceGradient)" stroke="#7dd3fc" stroke-width="1" filter="url(#crushedGlow)"/>
    <!-- Scattered shards -->
    <polygon points="120,280 130,295 110,295" fill="url(#crushedIceGradient)" stroke="#7dd3fc" stroke-width="0.8" opacity="0.8" filter="url(#crushedGlow)"/>
    <polygon points="280,280 290,295 270,295" fill="url(#crushedIceGradient)" stroke="#7dd3fc" stroke-width="0.8" opacity="0.8" filter="url(#crushedGlow)"/>
    <polygon points="100,330 110,345 90,345" fill="url(#crushedIceGradient)" stroke="#7dd3fc" stroke-width="0.8" opacity="0.6" filter="url(#crushedGlow)"/>
    <polygon points="300,330 310,345 290,345" fill="url(#crushedIceGradient)" stroke="#7dd3fc" stroke-width="0.8" opacity="0.6" filter="url(#crushedGlow)"/>
  </g>
  <!-- Brand badge -->
  <rect x="20" y="20" width="120" height="40" rx="6" fill="#0c4a6e" opacity="0.9"/>
  <text x="80" y="47" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#e0f2fe" text-anchor="middle">BEST GELOS</text>
  <rect x="20" y="340" width="160" height="40" rx="6" fill="#06b6d4" opacity="0.9"/>
  <text x="100" y="367" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Gelo Triturado 5kg</text>
</svg>