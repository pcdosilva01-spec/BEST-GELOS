<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="dryIceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#e2e8f0;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#cbd5e1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#94a3b8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="vaporGradient" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#e2e8f0;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#94a3b8;stop-opacity:0" />
    </linearGradient>
    <filter id="fogEffect" x="-50%" y="-50%" width="200%" height="200%">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="8" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="dryIceGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="blockHighlight" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity="1"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="#0f172a"/>
  <!-- Vapor/fog effect -->
  <g filter="url(#fogEffect)" opacity="0.4">
    <ellipse cx="200" cy="80" rx="180" ry="40" fill="url(#vaporGradient)"/>
    <ellipse cx="200" cy="100" rx="160" ry="35" fill="url(#vaporGradient)"/>
    <ellipse cx="200" cy="120" rx="140" ry="30" fill="url(#vaporGradient)"/>
    <ellipse cx="200" cy="140" rx="120" ry="25" fill="url(#vaporGradient)"/>
  </g>
  <!-- Dry ice blocks -->
  <g filter="url(#dryIceGlow)">
    <!-- Back block -->
    <path d="M120,280 L140,220 L260,220 L280,280 Z" fill="url(#dryIceGradient)" stroke="#94a3b8" stroke-width="1.5"/>
    <path d="M140,220 L160,180 L280,180 L260,220 Z" fill="url(#blockHighlight)" opacity="0.6"/>
    <path d="M260,220 L280,180 L280,280 L260,220 Z" fill="#94a3b8" opacity="0.5"/>

    <!-- Middle block -->
    <path d="M150,240 L170,180 L290,180 L310,240 Z" fill="url(#dryIceGradient)" stroke="#94a3b8" stroke-width="1.5"/>
    <path d="M170,180 L190,140 L310,140 L290,180 Z" fill="url(#blockHighlight)" opacity="0.7"/>
    <path d="M290,180 L310,140 L310,240 L290,180 Z" fill="#94a3b8" opacity="0.5"/>

    <!-- Front block (main) -->
    <path d="M80,280 L100,200 L300,200 L320,280 Z" fill="url(#dryIceGradient)" stroke="#94a3b8" stroke-width="2" filter="url(#dryIceGlow)"/>
    <path d="M100,200 L120,150 L320,150 L300,200 Z" fill="url(#blockHighlight)" opacity="0.8"/>
    <path d="M300,200 L320,150 L320,280 L300,200 Z" fill="#94a3b8" opacity="0.4"/>

    <!-- Vapor trails rising -->
    <ellipse cx="180" cy="140" rx="30" ry="15" fill="url(#vaporGradient)" opacity="0.5"/>
    <ellipse cx="240" cy="130" rx="25" ry="12" fill="url(#vaporGradient)" opacity="0.4"/>
    <ellipse cx="200" cy="120" rx="40" ry="10" fill="url(#vaporGradient)" opacity="0.3"/>
  </g>
  <!-- Temperature badge -->
  <rect x="20" y="20" width="100" height="40" rx="6" fill="#ef4444" opacity="0.9"/>
  <text x="70" y="47" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">-78°C</text>
  <!-- Brand badge -->
  <rect x="20" y="340" width="120" height="40" rx="6" fill="#0c4a6e" opacity="0.9"/>
  <text x="80" y="367" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#e0f2fe" text-anchor="middle">BEST GELOS</text>
  <rect x="260" y="340" width="120" height="40" rx="6" fill="#06b6d4" opacity="0.9"/>
  <text x="320" y="367" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Gelo Seco 1kg</text>
  <!-- Warning badge -->
  <rect x="20" y="280" width="140" height="30" rx="5" fill="#ef4444" opacity="0.9"/>
  <text x="90" y="300" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">⚠ Manuseio Especial</text>
</svg>