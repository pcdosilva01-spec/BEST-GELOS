<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="iceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2fe;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#bae6fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7dd3fc;stop-opacity:1" />
    </linearGradient>
    <filter id="iceGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="#f0f9ff"/>
  <!-- Ice cubes grid -->
  <g filter="url(#iceGlow)">
    <rect x="50" y="50" width="80" height="80" rx="8" fill="url(#iceGradient)" stroke="#7dd3fc" stroke-width="1.5"/>
    <rect x="50" y="50" width="80" height="80" rx="8" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.6"/>
    <rect x="160" y="50" width="80" height="80" rx="8" fill="url(#iceGradient)" stroke="#7dd3fc" stroke-width="1.5"/>
    <rect x="160" y="50" width="80" height="80" rx="8" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.6"/>
    <rect x="270" y="50" width="80" height="80" rx="8" fill="url(#iceGradient)" stroke="#7dd3fc" stroke-width="1.5"/>
    <rect x="270" y="50" width="80" height="80" rx="8" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.6"/>
    <rect x="50" y="160" width="80" height="80" rx="8" fill="url(#iceGradient)" stroke="#7dd3fc" stroke-width="1.5"/>
    <rect x="50" y="160" width="80" height="80" rx="8" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.6"/>
    <rect x="160" y="160" width="80" height="80" rx="8" fill="url(#iceGradient)" stroke="#7dd3fc" stroke-width="1.5"/>
    <rect x="160" y="160" width="80" height="80" rx="8" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.6"/>
    <rect x="270" y="160" width="80" height="80" rx="8" fill="url(#iceGradient)" stroke="#7dd3fc" stroke-width="1.5"/>
    <rect x="270" y="160" width="80" height="80" rx="8" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.6"/>
    <rect x="50" y="270" width="80" height="80" rx="8" fill="url(#iceGradient)" stroke="#7dd3fc" stroke-width="1.5"/>
    <rect x="50" y="270" width="80" height="80" rx="8" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.6"/>
    <rect x="160" y="270" width="80" height="80" rx="8" fill="url(#iceGradient)" stroke="#7dd3fc" stroke-width="1.5"/>
    <rect x="160" y="270" width="80" height="80" rx="8" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.6"/>
    <rect x="270" y="270" width="80" height="80" rx="8" fill="url(#iceGradient)" stroke="#7dd3fc" stroke-width="1.5"/>
    <rect x="270" y="270" width="80" height="80" rx="8" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.6"/>
  </g>
  <!-- Brand badge -->
  <rect x="20" y="20" width="120" height="40" rx="6" fill="#0c4a6e" opacity="0.9"/>
  <text x="80" y="47" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#e0f2fe" text-anchor="middle">BEST GELOS</text>
  <rect x="20" y="340" width="160" height="40" rx="6" fill="#06b6d4" opacity="0.9"/>
  <text x="100" y="367" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Gelo em Cubos 5kg</text>
</svg>