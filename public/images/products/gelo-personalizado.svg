<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="customIceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2fe;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#bae6fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7dd3fc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <filter id="customGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="logoGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="#f0f9ff"/>
  <!-- Main custom ice cube -->
  <g filter="url(#customGlow)">
    <rect x="70" y="60" width="260" height="260" rx="20" fill="url(#customIceGradient)" stroke="#7dd3fc" stroke-width="2"/>
    <rect x="70" y="60" width="260" height="260" rx="20" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
    <!-- Inner highlight -->
    <rect x="85" y="75" width="230" height="230" rx="15" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
  </g>
  <!-- Custom logo/brand on ice -->
  <g filter="url(#logoGlow)">
    <!-- BEST GELOS text -->
    <text x="200" y="160" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="url(#logoGradient)" text-anchor="middle" letter-spacing="2">BEST GELOS</text>
    <!-- Logo icon - ice cube with sparkle -->
    <g transform="translate(150, 190)">
      <rect x="0" y="0" width="100" height="100" rx="12" fill="url(#customIceGradient)" stroke="#7dd3fc" stroke-width="1.5"/>
      <rect x="8" y="8" width="84" height="84" rx="8" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
      <polygon points="50,20 55,35 70,35 58,45 60,60 50,52 40,60 42,45 30,35 45,35" fill="#06b6d4" filter="url(#logoGlow)"/>
    </g>
    <!-- Custom text below logo -->
    <text x="200" y="320" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#0c4a6e" text-anchor="middle">Seu Logo no Gelo</text>
    <text x="200" y="345" font-family="system-ui, sans-serif" font-size="13" font-weight="400" fill="#0369a1" text-anchor="middle">Eventos • Marcas • Casamentos</text>
  </g>
  <!-- Benefits badges -->
  <g font-family="system-ui, sans-serif" font-size="11" font-weight="600">
    <rect x="30" y="350" width="100" height="30" rx="5" fill="#06b6d4" opacity="0.9"/>
    <text x="80" y="370" fill="#ffffff" text-anchor="middle">Alta Definição</text>
    <rect x="150" y="350" width="100" height="30" rx="5" fill="#06b6d4" opacity="0.9"/>
    <text x="200" y="370" fill="#ffffff" text-anchor="middle">Não Dilui Rápido</text>
    <rect x="270" y="350" width="100" height="30" rx="5" fill="#06b6d4" opacity="0.9"/>
    <text x="320" y="370" fill="#ffffff" text-anchor="middle">Aprovação Prévia</text>
  </g>
  <!-- Brand badge -->
  <rect x="20" y="20" width="120" height="40" rx="6" fill="#0c4a6e" opacity="0.9"/>
  <text x="80" y="47" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#e0f2fe" text-anchor="middle">BEST GELOS</text>
  <rect x="260" y="20" width="120" height="40" rx="6" fill="#06b6d4" opacity="0.9"/>
  <text x="320" y="47" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Personalizado</text>
</svg>